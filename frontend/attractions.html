<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attraction - Discover Uzbekistan</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KJHCVBY91E"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag() { dataLayer.push(arguments); } gtag('js', new Date()); gtag('config', 'G-KJHCVBY91E');</script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --teal: #0ABFBC;
            --teal-d: #089A98;
            --orange: #FC7A1E;
            --purple: #8B5CF6;
            --pink: #EC4899;
            --bg: #0F1117;
            --bg2: #181B24;
            --bg3: #1F2330;
            --bg4: #262B3A;
            --text: #F1F5F9;
            --muted: rgba(241, 245, 249, 0.5);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg4);
            border-radius: 3px;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            padding: 14px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(15, 17, 23, 0.97) 0%, transparent 100%);
            backdrop-filter: blur(8px);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 20px;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .share-btn {
            background: rgba(10, 191, 188, 0.12);
            border: 1px solid rgba(10, 191, 188, 0.3);
            color: var(--teal);
            padding: 9px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
        }

        .share-btn:hover {
            background: rgba(10, 191, 188, 0.22);
        }

        /* HERO */
        .hero {
            height: 100vh;
            min-height: 620px;
            position: relative;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a2a3a 0%, #0f1520 100%);
            background-size: cover;
            background-position: center;
            transition: transform 10s ease;
        }

        .hero:hover .hero-bg {
            transform: scale(1.04);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(8, 154, 152, 0.28) 0%, transparent 38%, rgba(15, 17, 23, 0.55) 68%, rgba(15, 17, 23, 0.97) 100%);
        }

        .hero-glow {
            position: absolute;
            top: -80px;
            left: -80px;
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, rgba(10, 191, 188, 0.2) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-glow2 {
            position: absolute;
            bottom: -60px;
            right: -60px;
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 72px;
        }

        .category-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--teal), var(--purple));
            color: white;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 50px;
            margin-bottom: 18px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(36px, 5.5vw, 74px);
            font-weight: 700;
            line-height: 1.07;
            margin-bottom: 12px;
            max-width: 800px;
        }

        .hero-period {
            font-size: 15px;
            color: rgba(10, 191, 188, 0.9);
            margin-bottom: 26px;
            font-style: italic;
        }

        .hero-meta {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }

        .meta-badge {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            padding: 7px 14px;
            border-radius: 50px;
            font-size: 13px;
            color: var(--muted);
        }

        .meta-badge.rating {
            border-color: rgba(252, 122, 30, 0.4);
            color: var(--orange);
        }

        .meta-badge.fee {
            border-color: rgba(139, 92, 246, 0.4);
            color: var(--purple);
        }

        .like-btn {
            position: absolute;
            bottom: 72px;
            right: 48px;
            width: 54px;
            height: 54px;
            background: rgba(15, 17, 23, 0.78);
            backdrop-filter: blur(12px);
            border: 1.5px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            color: var(--muted);
            transition: all 0.3s;
        }

        .like-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c;
            transform: scale(1.12);
        }

        .like-btn.liked {
            background: rgba(231, 76, 60, 0.18);
            border-color: #e74c3c;
            color: #e74c3c;
        }

        /* ACTIONS BAR */
        .actions-bar {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }

        .actions-bar::-webkit-scrollbar {
            display: none;
        }

        .actions-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px;
            display: flex;
            white-space: nowrap;
        }

        .action-tab {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            border: none;
            border-bottom: 2px solid transparent;
            background: none;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
        }

        .action-tab:hover {
            color: var(--text);
            border-bottom-color: rgba(255, 255, 255, 0.2);
        }

        .action-tab.cta {
            color: var(--teal);
            border-bottom-color: var(--teal);
        }

        /* LAYOUT */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 52px 48px;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 52px;
            align-items: start;
        }

        .section {
            margin-bottom: 44px;
        }

        /* SECTION HEADER */
        .sec-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
        }

        .sec-line {
            width: 4px;
            height: 26px;
            border-radius: 2px;
            background: linear-gradient(180deg, var(--teal), var(--purple));
            flex-shrink: 0;
        }

        .sec-head h2 {
            font-size: 22px;
            font-weight: 700;
        }

        /* DESCRIPTION */
        .desc-text {
            font-size: 15.5px;
            line-height: 1.88;
            color: rgba(241, 245, 249, 0.75);
        }

        /* INFO GRID */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .info-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            transition: border-color 0.2s, transform 0.2s;
        }

        .info-card:hover {
            border-color: rgba(10, 191, 188, 0.35);
            transform: translateY(-2px);
        }

        .info-card-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 8px;
        }

        .info-card-val {
            font-size: 14px;
            font-weight: 500;
        }

        /* GALLERY */
        .gallery-main-wrap {
            position: relative;
            height: 420px;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg3);
            margin-bottom: 10px;
            cursor: zoom-in;
        }

        .gallery-main-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-main-wrap:hover img {
            transform: scale(1.04);
        }

        .gallery-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--muted);
            font-size: 14px;
        }

        .gallery-strip {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .g-thumb {
            height: 86px;
            border-radius: 10px;
            overflow: hidden;
            background: var(--bg3);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .g-thumb.active {
            border-color: var(--teal);
            box-shadow: 0 0 0 2px rgba(10, 191, 188, 0.3);
        }

        .g-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }

        .g-thumb:hover img {
            transform: scale(1.1);
        }

        .g-more {
            position: absolute;
            inset: 0;
            background: rgba(15, 17, 23, 0.72);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: var(--teal);
        }

        /* MAP */
        #attractionMap {
            height: 360px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* REVIEWS */
        .review-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px 24px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        .review-card:hover {
            border-color: rgba(10, 191, 188, 0.2);
        }

        .review-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 9px;
        }

        .reviewer {
            font-weight: 600;
            font-size: 14.5px;
        }

        .rev-date {
            font-size: 11.5px;
            color: var(--muted);
        }

        .rev-stars {
            color: var(--orange);
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .rev-text {
            font-size: 13.5px;
            line-height: 1.75;
            color: rgba(241, 245, 249, 0.7);
        }

        .toggle-reviews-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 13.5px;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .toggle-reviews-btn:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        /* SIDEBAR */
        .sidebar-widget {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .widget-head {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .widget-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--orange), var(--pink));
        }

        .nearby-item {
            display: flex;
            gap: 14px;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: background 0.2s;
        }

        .nearby-item:last-child {
            border-bottom: none;
        }

        .nearby-item:hover {
            background: var(--bg3);
        }

        .nb-thumb {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .nb-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nb-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .nb-dist {
            font-size: 11.5px;
            color: var(--teal);
        }

        .nb-rating {
            font-size: 11px;
            color: var(--orange);
            margin-top: 2px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-box {
            background: var(--bg2);
            border: 1px solid rgba(10, 191, 188, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 520px;
            max-height: 92vh;
            overflow-y: auto;
        }

        .modal-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
        }

        .modal-x {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 28px;
            cursor: pointer;
        }

        .modal-x:hover {
            color: var(--text);
        }

        .form-lbl {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 9px;
        }

        .form-ctrl {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        .form-ctrl:focus {
            outline: none;
            border-color: rgba(10, 191, 188, 0.5);
        }

        textarea.form-ctrl {
            min-height: 110px;
            resize: vertical;
        }

        .stars-row-input {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
        }

        .star-btn {
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.15);
            transition: all 0.15s;
        }

        .star-btn:hover,
        .star-btn.lit {
            color: var(--orange);
        }

        .rating-hint {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 18px;
            min-height: 18px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--teal), var(--purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.88;
        }

        /* LIGHTBOX */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.97);
            z-index: 600;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 6px;
        }

        .lb-close {
            position: absolute;
            top: 18px;
            right: 24px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 38px;
            cursor: pointer;
        }

        .lb-prev,
        .lb-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: white;
            font-size: 32px;
            padding: 16px 12px;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .lb-prev {
            left: 16px;
        }

        .lb-next {
            right: 16px;
        }

        .lb-prev:hover,
        .lb-next:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* SPINNER */
        .spinner {
            width: 34px;
            height: 34px;
            border: 3px solid rgba(10, 191, 188, 0.12);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 28px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 30px;
            font-size: 13.5px;
        }

        /* RESPONSIVE */
        @media(max-width:1024px) {
            .main {
                grid-template-columns: 1fr;
                padding: 36px 24px;
            }

            .hero-content {
                padding: 0 24px 52px;
            }

            .actions-inner {
                padding: 0 20px;
            }

            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .gallery-strip {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media(max-width:640px) {
            header {
                padding: 12px 18px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .gallery-main-wrap {
                height: 250px;
            }

            .gallery-strip {
                grid-template-columns: repeat(3, 1fr);
            }

            .like-btn {
                bottom: 56px;
                right: 20px;
            }

            .action-tab span {
                display: none;
            }

            .info-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="javascript:history.back()" class="back-btn">← Back</a>
        <button class="share-btn" onclick="shareAttraction()">Share ↗</button>
    </header>

    <div class="hero" id="heroSection">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-glow"></div>
        <div class="hero-glow2"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="category-pill" id="categoryPill">⬡ Loading</div>
            <h1 id="heroName">—</h1>
            <p class="hero-period" id="heroPeriod" style="display:none;"></p>
            <div class="hero-meta">
                <div class="meta-badge"><span>📍</span><span id="heroAddr">—</span></div>
                <div class="meta-badge rating"><span id="heroStars">☆☆☆☆☆</span><span id="heroRating">—</span><span
                        style="font-size:12px;opacity:0.7;">(<span id="heroRevCount">0</span>)</span></div>
                <div class="meta-badge fee" id="heroFeeWrap" style="display:none;"><span>🎫</span><span
                        id="heroFee"></span></div>
            </div>
        </div>
        <button class="like-btn" id="likeBtn" onclick="toggleLike()">♡</button>
    </div>

    <div class="actions-bar">
        <div class="actions-inner">
            <button class="action-tab" onclick="callInfo()">📞 <span>Call</span></button>
            <button class="action-tab" onclick="openDirections()">🗺 <span>Directions</span></button>
            <button class="action-tab" id="websiteTab" style="display:none;" onclick="openWebsite()">🌐
                <span>Website</span></button>
            <button class="action-tab cta" onclick="openReviewModal()">★ <span>Write Review</span></button>
        </div>
    </div>

    <div class="main">
        <div>
            <div class="section">
                <div class="sec-head">
                    <div class="sec-line"></div>
                    <h2>About This Place</h2>
                </div>
                <p class="desc-text" id="descText">Loading…</p>
            </div>
            <div class="section">
                <div class="sec-head">
                    <div class="sec-line"></div>
                    <h2>Visitor Information</h2>
                </div>
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-card-label">Opening Hours</div>
                        <div class="info-card-val" id="iHours">—</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-label">Entry Fee</div>
                        <div class="info-card-val" id="iFee">—</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-label">Category</div>
                        <div class="info-card-val" id="iCat">—</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-label">Year Built</div>
                        <div class="info-card-val" id="iBuilt">—</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-label">Rating</div>
                        <div class="info-card-val" id="iRating">—</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-label">Total Reviews</div>
                        <div class="info-card-val" id="iRevs">—</div>
                    </div>
                </div>
            </div>
            <div class="section">
                <div class="sec-head">
                    <div class="sec-line"></div>
                    <h2>Photo Gallery</h2>
                </div>
                <div class="gallery-main-wrap" id="galleryMainWrap" onclick="openLightbox(activeLbIdx)">
                    <div class="gallery-placeholder" id="galleryPlaceholder">
                        <div class="spinner"></div>
                        <p>Loading photos…</p>
                    </div>
                    <img id="galleryMainImg" src="" alt="" style="display:none;">
                </div>
                <div class="gallery-strip" id="galleryStrip"></div>
            </div>
            <div class="section">
                <div class="sec-head">
                    <div class="sec-line"></div>
                    <h2>Location</h2>
                </div>
                <div id="attractionMap"></div>
            </div>
            <div class="section">
                <div class="sec-head">
                    <div class="sec-line"></div>
                    <h2>Visitor Reviews</h2>
                </div>
                <div id="reviewsList"></div>
                <button class="toggle-reviews-btn" id="revToggleBtn" onclick="toggleReviews()">Load Reviews</button>
            </div>
        </div>
        <div>
            <div class="sidebar-widget">
                <div class="widget-head">
                    <div class="widget-dot"></div>Nearby Attractions
                </div>
                <div id="nearbyList">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal" id="reviewModal">
        <div class="modal-box">
            <div class="modal-top">
                <h2 class="modal-title">Write a Review</h2>
                <button class="modal-x" onclick="closeReviewModal()">×</button>
            </div>
            <form onsubmit="submitReview(event)">
                <label class="form-lbl">Your Rating</label>
                <div class="stars-row-input">
                    <button type="button" class="star-btn" data-r="1" onclick="setRating(1)">★</button>
                    <button type="button" class="star-btn" data-r="2" onclick="setRating(2)">★</button>
                    <button type="button" class="star-btn" data-r="3" onclick="setRating(3)">★</button>
                    <button type="button" class="star-btn" data-r="4" onclick="setRating(4)">★</button>
                    <button type="button" class="star-btn" data-r="5" onclick="setRating(5)">★</button>
                </div>
                <div class="rating-hint" id="ratingHint">Tap a star</div>
                <label class="form-lbl">Your Name</label>
                <input type="text" id="revName" class="form-ctrl" placeholder="Your name" required>
                <label class="form-lbl">Your Review</label>
                <textarea id="revText" class="form-ctrl" placeholder="Share your experience…" required></textarea>
                <button type="submit" class="submit-btn">Submit Review</button>
            </form>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lb-close" onclick="closeLightbox()">×</button>
        <button class="lb-prev" onclick="event.stopPropagation();lbNav(-1)">‹</button>
        <img id="lbImg" src="" alt="">
        <button class="lb-next" onclick="event.stopPropagation();lbNav(1)">›</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API = 'http://127.0.0.1:8000';

        // KEY FIX: convert any relative/filename URL to a full absolute URL
        function fixUrl(url) {
            if (!url) return '';
            if (url.startsWith('http') || url.startsWith('data:')) return url;
            if (!url.startsWith('/')) url = '/static/uploads/' + url;
            return API + url;
        }

        let attraction = null, allPhotos = [], activeLbIdx = 0, selRating = 0;
        let revVisible = false, userPos = null, map = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const id = new URLSearchParams(location.search).get('id');
            if (!id) { document.body.innerHTML = '<div style="text-align:center;padding:120px 20px;color:#aaa;font-size:16px;">Add ?id=1 to the URL</div>'; return; }
            await loadAttraction(id);
            getUserLocation().then(() => { loadNearby(); if (map && userPos) addUserToMap(); });
        });

        async function loadAttraction(id) {
            try {
                const res = await fetch(`${API}/attractions/${id}`);
                if (!res.ok) throw new Error('Not found');
                attraction = await res.json();
                renderHero();
                await loadGallery();
                initMap();
                checkLiked();
            } catch (e) {
                document.getElementById('heroName').textContent = 'Attraction not found';
                document.getElementById('descText').textContent = e.message;
            }
        }

        function renderHero() {
            const a = attraction;
            document.title = `${a.name} – Discover Uzbekistan`;
            if (a.image_url) {
                const bg = document.getElementById('heroBg');
                bg.style.backgroundImage = `url('${fixUrl(a.image_url)}')`;
                bg.style.backgroundSize = 'cover';
                bg.style.backgroundPosition = 'center';
            }
            document.getElementById('heroName').textContent = a.name;
            document.getElementById('categoryPill').innerHTML = `⬡ &nbsp;${a.category || 'Attraction'}`;
            document.getElementById('heroAddr').textContent = a.address || '—';
            document.getElementById('descText').textContent = a.description || 'No description available.';
            if (a.historical_period || a.year_built) {
                const p = document.getElementById('heroPeriod');
                p.textContent = [a.historical_period, a.year_built ? `Built ${a.year_built}` : ''].filter(Boolean).join(' · ');
                p.style.display = '';
            }
            const r = a.rating || 0;
            document.getElementById('heroStars').textContent = starsStr(r);
            document.getElementById('heroRating').textContent = r.toFixed(1);
            document.getElementById('heroRevCount').textContent = a.review_count || 0;
            if (a.entry_fee) { document.getElementById('heroFeeWrap').style.display = 'flex'; document.getElementById('heroFee').textContent = a.entry_fee; }
            if (a.website) document.getElementById('websiteTab').style.display = '';
            document.getElementById('iHours').textContent = a.opening_hours || 'Contact for hours';
            document.getElementById('iFee').textContent = a.entry_fee || 'Free entry';
            document.getElementById('iCat').textContent = a.category || '—';
            document.getElementById('iBuilt').textContent = a.year_built || '—';
            document.getElementById('iRating').textContent = r.toFixed(1) + ' / 5.0';
            document.getElementById('iRevs').textContent = (a.review_count || 0) + ' reviews';
        }

        function starsStr(r) { const f = Math.round(r); return '★'.repeat(f) + '☆'.repeat(5 - f); }

        async function loadGallery() {
            let gallery = [];
            try {
                const res = await fetch(`${API}/attractions/${attraction.id}/gallery`);
                if (res.ok) gallery = await res.json();
            } catch { }

            allPhotos = [];
            if (attraction.image_url) allPhotos.push({ image_url: fixUrl(attraction.image_url), caption: attraction.name });
            gallery.forEach(p => allPhotos.push({ ...p, image_url: fixUrl(p.image_url) }));

            const mainImg = document.getElementById('galleryMainImg');
            const placeholder = document.getElementById('galleryPlaceholder');
            const strip = document.getElementById('galleryStrip');

            if (!allPhotos.length) {
                placeholder.innerHTML = '<div style="font-size:40px;opacity:0.25;">🏛</div><p>No photos uploaded yet</p>';
                return;
            }
            placeholder.style.display = 'none';
            mainImg.style.display = 'block';
            mainImg.src = allPhotos[0].image_url;
            activeLbIdx = 0;

            const show = Math.min(5, allPhotos.length);
            strip.innerHTML = allPhotos.slice(0, show).map((p, i) => {
                const isMore = i === 4 && allPhotos.length > 5;
                return `<div class="g-thumb ${i === 0 ? 'active' : ''}" onclick="selectPhoto(${i})">
            <img src="${p.image_url}" alt="">
            ${isMore ? `<div class="g-more">+${allPhotos.length - 4}</div>` : ''}
        </div>`;
            }).join('');
        }

        function selectPhoto(idx) {
            if (!allPhotos[idx]) return;
            activeLbIdx = idx;
            document.getElementById('galleryMainImg').src = allPhotos[idx].image_url;
            document.querySelectorAll('.g-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
        }

        function openLightbox(idx) {
            if (!allPhotos.length) return;
            activeLbIdx = idx;
            document.getElementById('lbImg').src = allPhotos[idx].image_url;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
        function lbNav(d) {
            activeLbIdx = (activeLbIdx + d + allPhotos.length) % allPhotos.length;
            document.getElementById('lbImg').src = allPhotos[activeLbIdx].image_url;
        }

        function initMap() {
            if (!attraction?.latitude || !attraction?.longitude) return;
            map = L.map('attractionMap').setView([attraction.latitude, attraction.longitude], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            L.marker([attraction.latitude, attraction.longitude]).addTo(map)
                .bindPopup(`<b>${attraction.name}</b><br>${attraction.address || ''}`).openPopup();
        }
        function addUserToMap() {
            if (!map || !userPos) return;
            const icon = L.divIcon({ html: '<div style="background:#0ABFBC;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 0 10px #0ABFBC;"></div>', iconSize: [22, 22], iconAnchor: [11, 11] });
            L.marker([userPos.lat, userPos.lng], { icon }).addTo(map).bindPopup('You are here');
            L.polyline([[userPos.lat, userPos.lng], [attraction.latitude, attraction.longitude]], { color: '#FC7A1E', weight: 3, dashArray: '7 5', opacity: 0.7 }).addTo(map);
            map.fitBounds([[userPos.lat, userPos.lng], [attraction.latitude, attraction.longitude]], { padding: [50, 50] });
        }

        async function loadNearby() {
            const el = document.getElementById('nearbyList');
            try {
                const res = await fetch(`${API}/attractions`);
                let list = (await res.json()).filter(a => a.id !== attraction.id);
                if (userPos) {
                    list = list.map(a => ({ ...a, dist: calcDist(userPos.lat, userPos.lng, a.latitude, a.longitude) }))
                        .filter(a => a.dist <= 60).sort((a, b) => a.dist - b.dist).slice(0, 6);
                } else { list = list.slice(0, 6); }
                if (!list.length) { el.innerHTML = '<div class="empty">No nearby attractions found</div>'; return; }
                el.innerHTML = list.map(a => `
            <a class="nearby-item" href="attractions.html?id=${a.id}">
                <div class="nb-thumb">${a.image_url ? `<img src="${fixUrl(a.image_url)}" onerror="this.parentElement.textContent='🏛'">` : '🏛'}</div>
                <div>
                    <div class="nb-name">${a.name}</div>
                    ${a.dist != null ? `<div class="nb-dist">${a.dist.toFixed(1)} km away</div>` : ''}
                    ${a.rating ? `<div class="nb-rating">★ ${a.rating.toFixed(1)}</div>` : ''}
                </div>
            </a>`).join('');
            } catch { el.innerHTML = '<div class="empty">Could not load nearby attractions</div>'; }
        }

        async function toggleReviews() {
            const btn = document.getElementById('revToggleBtn'), list = document.getElementById('reviewsList');
            if (revVisible) { list.innerHTML = ''; btn.textContent = 'Load Reviews'; revVisible = false; return; }
            btn.textContent = 'Loading…';
            try {
                const res = await fetch(`${API}/attractions/${attraction.id}/reviews`);
                const reviews = await res.json();
                list.innerHTML = !reviews.length
                    ? '<div class="empty">No reviews yet — be the first!</div>'
                    : reviews.map(r => `<div class="review-card"><div class="review-row"><div class="reviewer">${r.reviewer_name}</div><div class="rev-date">${fmtDate(r.created_at)}</div></div><div class="rev-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div><div class="rev-text">${r.comment}</div></div>`).join('');
                btn.textContent = 'Hide Reviews'; revVisible = true;
            } catch { btn.textContent = 'Load Reviews'; }
        }

        function openReviewModal() { document.getElementById('reviewModal').classList.add('active'); }
        function closeReviewModal() { document.getElementById('reviewModal').classList.remove('active'); }
        document.getElementById('reviewModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeReviewModal(); });

        function setRating(n) {
            selRating = n;
            const labels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];
            document.getElementById('ratingHint').textContent = labels[n] || '';
            document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('lit', +b.dataset.r <= n));
        }

        async function submitReview(e) {
            e.preventDefault();
            if (!selRating) { alert('Please select a rating'); return; }
            const name = document.getElementById('revName').value.trim();
            const text = document.getElementById('revText').value.trim();
            if (!name || !text) return;
            try {
                const res = await fetch(`${API}/attractions/reviews`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ attraction_id: attraction.id, reviewer_name: name, rating: selRating, comment: text }) });
                if (!res.ok) throw new Error();
                alert('Thank you for your review!');
                closeReviewModal();
                selRating = 0; document.getElementById('revName').value = ''; document.getElementById('revText').value = '';
                document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('lit'));
                document.getElementById('ratingHint').textContent = 'Tap a star';
                const updated = await fetch(`${API}/attractions/${attraction.id}`);
                attraction = await updated.json();
                const r = attraction.rating || 0;
                document.getElementById('heroStars').textContent = starsStr(r);
                document.getElementById('heroRating').textContent = r.toFixed(1);
                document.getElementById('heroRevCount').textContent = attraction.review_count || 0;
                if (revVisible) { revVisible = false; toggleReviews(); }
            } catch { alert('Failed to submit review. Please try again.'); }
        }

        function checkLiked() {
            if (localStorage.getItem(`fav_att_${attraction.id}`) === '1') {
                document.getElementById('likeBtn').classList.add('liked');
                document.getElementById('likeBtn').textContent = '♥';
            }
        }
        function toggleLike() {
            const btn = document.getElementById('likeBtn'), key = `fav_att_${attraction?.id}`, on = btn.classList.contains('liked');
            btn.classList.toggle('liked', !on); btn.textContent = on ? '♡' : '♥';
            on ? localStorage.removeItem(key) : localStorage.setItem(key, '1');
        }

        function callInfo() { if (attraction?.phone) location.href = `tel:${attraction.phone.replace(/\D/g, '')}`; else alert('No phone number available.'); }
        function openWebsite() { if (attraction?.website) window.open(attraction.website, '_blank'); }
        function openDirections() {
            if (!attraction?.latitude) return;
            const dest = `${attraction.latitude},${attraction.longitude}`;
            window.open(userPos ? `https://www.google.com/maps/dir/${userPos.lat},${userPos.lng}/${dest}` : `https://www.google.com/maps/search/?api=1&query=${dest}`, '_blank');
        }
        function shareAttraction() {
            if (!attraction) return;
            if (navigator.share) navigator.share({ title: attraction.name, url: location.href });
            else navigator.clipboard.writeText(location.href).then(() => alert('Link copied!'));
        }

        async function getUserLocation() {
            if (!navigator.geolocation) return;
            return new Promise(resolve => {
                navigator.geolocation.getCurrentPosition(p => { userPos = { lat: p.coords.latitude, lng: p.coords.longitude }; resolve(); }, () => resolve(), { timeout: 8000 });
            });
        }
        function calcDist(la1, lo1, la2, lo2) {
            if (!la2 || !lo2) return Infinity;
            const R = 6371, dL = (la2 - la1) * Math.PI / 180, dO = (lo2 - lo1) * Math.PI / 180;
            const a = Math.sin(dL / 2) ** 2 + Math.cos(la1 * Math.PI / 180) * Math.cos(la2 * Math.PI / 180) * Math.sin(dO / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
        function fmtDate(d) { return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }

        // Analytics — no credentials flag to avoid CORS wildcard error
        (function () {
            const id = new URLSearchParams(location.search).get('id'); if (!id) return;
            const start = Date.now();
            const sess = sessionStorage.getItem('_asess') || ('s' + Date.now() + Math.random().toString(36).slice(2, 9));
            sessionStorage.setItem('_asess', sess);
            let sent = false;
            function send() {
                if (sent) return; sent = true;
                fetch(`${API}/api/analytics/track`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ page_type: 'attraction', page_id: +id, partner_id: +id, time_spent: Math.floor((Date.now() - start) / 1000), session_id: sess }) }).catch(() => { });
            }
            window.addEventListener('beforeunload', send);
            document.addEventListener('visibilitychange', () => { if (document.hidden) send(); });
            setInterval(() => { if (!document.hidden) { sent = false; send(); } }, 30000);
        })();
    </script>
</body>

</html>
