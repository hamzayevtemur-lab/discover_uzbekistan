<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Restaurant — Discover Uzbekistan</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="apple-touch-icon" href="/images/logo.png">

        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0d0d0d;
            --bg2: #141414;
            --bg3: #1c1c1c;
            --bg4: #242424;
            --txt: #e8e4df;
            --txt2: #a09488;
            --txt3: #6e6058;
            --brd: rgba(255, 255, 255, .07);
            --brd2: rgba(255, 255, 255, .14);
            --ac: #ff6b6b;
            --ac2: #ffd166;
            --ac3: #4ecdc4;
            --grn: #51cf66;
            --r: 12px;
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--txt);
            overflow-x: hidden;
            min-height: 100vh
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 900;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.2rem;
            background: rgba(13, 13, 13, .9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--brd)
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: .07em;
            color: var(--txt);
            text-decoration: none
        }

        .nav-logo span {
            color: var(--ac)
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: .35rem;
            color: var(--txt3);
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            text-decoration: none;
            transition: color .2s;
            border: none;
            background: none;
            cursor: pointer;
            font-family: 'Outfit', sans-serif
        }

        .nav-back:hover {
            color: var(--txt)
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: .5rem
        }

        .nb {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--brd2);
            background: transparent;
            color: var(--txt2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            transition: all .2s
        }

        .nb:hover,
        .nb.liked {
            border-color: var(--ac);
            color: var(--ac);
            background: rgba(255, 107, 107, .1)
        }

        .nsb {
            background: transparent;
            border: 1px solid var(--brd2);
            color: var(--txt2);
            padding: .32rem .9rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: .72rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: .4rem
        }

        .nsb:hover {
            border-color: var(--ac);
            color: var(--ac)
        }

        .hero {
            position: relative;
            height: 100svh;
            min-height: 480px;
            display: flex;
            align-items: flex-end;
            overflow: hidden
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transform: scale(1.06);
            transition: transform 14s ease-out;
            filter: brightness(.45)
        }

        .hero-bg.loaded {
            transform: scale(1)
        }

        .hgrad {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13, 13, 13, 1) 0%, rgba(13, 13, 13, .6) 45%, rgba(13, 13, 13, .05) 100%)
        }

        .hc {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 0 1.3rem 2.8rem
        }

        .heyebrow {
            display: flex;
            flex-wrap: wrap;
            gap: .35rem;
            margin-bottom: .8rem;
            opacity: 0;
            animation: up .5s .15s forwards
        }

        .hb {
            display: inline-flex;
            align-items: center;
            gap: .28rem;
            font-size: .62rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .22rem .68rem;
            border-radius: 50px
        }

        .hb-p {
            background: rgba(255, 209, 102, .14);
            color: #ffd166;
            border: 1px solid rgba(255, 209, 102, .3)
        }

        .hb-c {
            background: rgba(255, 107, 107, .12);
            color: rgba(255, 150, 150, .85);
            border: 1px solid rgba(255, 107, 107, .25)
        }

        .hname {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.8rem, 10vw, 6rem);
            font-weight: 700;
            line-height: .92;
            letter-spacing: .01em;
            color: #fff;
            opacity: 0;
            transform: translateY(20px);
            animation: up .65s .28s forwards
        }

        .hmeta {
            display: flex;
            flex-wrap: wrap;
            gap: .8rem 1.3rem;
            margin-top: .9rem;
            font-size: .82rem;
            color: rgba(255, 255, 255, .58);
            opacity: 0;
            animation: up .55s .45s forwards
        }

        .hmi {
            display: flex;
            align-items: center;
            gap: .32rem
        }

        .hmi i {
            color: var(--ac);
            font-size: .78rem
        }

        .hmi strong {
            color: #fff
        }

        /* rating inline — no absolute */
        .hrat {
            display: inline-flex;
            align-items: center;
            gap: .7rem;
            margin-top: 1.1rem;
            background: rgba(13, 13, 13, .55);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 12px;
            padding: .7rem 1rem;
            opacity: 0;
            animation: up .55s .5s forwards
        }

        .hrn {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            color: var(--ac2)
        }

        .hrat-right {
            display: flex;
            flex-direction: column;
            gap: .12rem
        }

        .hrs {
            color: var(--ac2);
            font-size: .82rem
        }

        .hrc {
            font-size: .63rem;
            color: rgba(255, 255, 255, .38)
        }

        @keyframes up {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .anav {
            position: sticky;
            top: 56px;
            z-index: 800;
            background: rgba(13, 13, 13, .92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--brd)
        }

        .ainner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 0 .8rem
        }

        .ainner::-webkit-scrollbar {
            display: none
        }

        .atab {
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--txt3);
            font-family: 'Outfit', sans-serif;
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: .72rem 1rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all .2s
        }

        .atab:hover {
            color: var(--txt)
        }

        .atab.active {
            color: var(--ac);
            border-bottom-color: var(--ac)
        }

        .ibar {
            background: var(--bg2);
            border-bottom: 1px solid var(--brd)
        }

        .ibinner {
            max-width: 900px;
            margin: 0 auto;
            padding: .85rem 1.3rem;
            display: flex;
            flex-wrap: wrap;
            gap: .45rem 1.2rem;
            align-items: center
        }

        .qi {
            display: flex;
            align-items: center;
            gap: .4rem;
            font-size: .81rem;
            color: var(--txt2)
        }

        .qi i {
            font-size: .76rem;
            width: 14px;
            text-align: center
        }

        .qi i.fa-location-dot {
            color: var(--ac)
        }

        .qi i.fa-phone {
            color: var(--ac)
        }

        .qi i.fa-globe {
            color: #64b5f6
        }

        .qi a {
            text-decoration: none
        }

        .qi-ig {
            display: inline-flex;
            align-items: center;
            gap: .38rem;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            padding: .28rem .72rem;
            border-radius: 50px;
            font-size: .75rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            transition: opacity .2s
        }

        .qi-ig:hover {
            opacity: .85
        }

        .qi-tg {
            display: inline-flex;
            align-items: center;
            gap: .38rem;
            background: #229ED9;
            padding: .28rem .72rem;
            border-radius: 50px;
            font-size: .75rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            transition: opacity .2s
        }

        .qi-tg:hover {
            opacity: .85
        }

        /* single scrollable row of action buttons */
        .arow {
            display: flex;
            gap: .55rem;
            margin-bottom: 2rem;
            margin-top: 1rem;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: .2rem
        }

        .arow::-webkit-scrollbar {
            display: none
        }

        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.8rem 1.3rem 5rem
        }

        .section {
            margin-bottom: 2.8rem
        }

        .shd {
            display: flex;
            align-items: center;
            gap: .8rem;
            margin-bottom: 1.3rem
        }

        .stitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.55rem;
            font-weight: 600;
            color: var(--txt);
            white-space: nowrap
        }

        .stitle i {
            color: var(--ac);
            margin-right: .4rem;
            font-size: 1rem
        }

        .srule {
            flex: 1;
            height: 1px;
            background: var(--brd)
        }

        .spill {
            font-size: .62rem;
            font-weight: 700;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--txt3);
            background: var(--bg3);
            border: 1px solid var(--brd);
            padding: .16rem .6rem;
            border-radius: 50px
        }

        .arow {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            margin-bottom: 2rem;
            margin-top: 1rem
        }

        .ab {
            display: inline-flex;
            align-items: center;
            gap: .42rem;
            padding: .6rem 1.15rem;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            border: none;
            text-decoration: none;
            white-space: nowrap
        }

        .ab-p {
            background: var(--ac);
            color: #fff
        }

        .ab-p:hover {
            background: #e85555;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, .25)
        }

        .ab-s {
            background: var(--bg3);
            color: var(--txt);
            border: 1px solid var(--brd2)
        }

        .ab-s:hover {
            background: var(--bg4);
            border-color: rgba(255, 255, 255, .22)
        }

        .ab-ig {
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            color: #fff
        }

        .ab-ig:hover {
            opacity: .88;
            transform: translateY(-2px)
        }

        .ab-tg {
            background: #229ED9;
            color: #fff
        }

        .ab-tg:hover {
            background: #1a8bc2;
            transform: translateY(-2px)
        }

        /* ── MENU TABS ── */
        .mtabs {
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 1.2rem
        }

        .mtabs::-webkit-scrollbar {
            display: none
        }

        .mtr {
            display: flex;
            gap: .42rem;
            padding-bottom: .25rem
        }

        .mtb {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            background: var(--bg3);
            border: 1px solid var(--brd);
            color: var(--txt2);
            padding: .46rem .95rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: .76rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all .2s
        }

        .mtb:hover {
            background: var(--bg4);
            border-color: var(--brd2);
            color: var(--txt)
        }

        .mtb.active {
            background: rgba(255, 107, 107, .12);
            border-color: var(--ac);
            color: var(--ac)
        }

        /* ── MENU GRID — ALWAYS 2 COLUMNS ── */
        .mgrid {
            display: flex;
            flex-direction: column;
            gap: .75rem
        }

        .mc {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: var(--r);
            overflow: hidden;
            transition: all .28s;
            cursor: pointer;
            display: flex;
            flex-direction: row;
            align-items: stretch
        }

        .mc:hover {
            border-color: var(--brd2);
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, .4)
        }

        .mc-img {
            width: 110px;
            min-width: 110px;
            height: auto;
            min-height: 110px;
            overflow: hidden;
            background: var(--bg3);
            position: relative;
            border-radius: var(--r) 0 0 var(--r);
            flex-shrink: 0
        }

        .mc-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .5s;
            display: block
        }

        .mc:hover .mc-img img {
            transform: scale(1.06)
        }

        .mc-ph {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--bg3), var(--bg4))
        }

        .mc-body {
            padding: .85rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center
        }

        .mc-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--txt);
            margin-bottom: .2rem;
            line-height: 1.2
        }

        .mc-desc {
            font-size: .73rem;
            color: var(--txt2);
            line-height: 1.45;
            margin-bottom: .55rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .mc-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: .3rem
        }

        .mc-price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.18rem;
            font-weight: 700;
            color: var(--ac2)
        }

        .mc-tags {
            display: flex;
            flex-wrap: wrap;
            gap: .28rem
        }

        .mc-tag {
            background: rgba(255, 107, 107, .1);
            color: var(--ac);
            font-size: .63rem;
            font-weight: 600;
            padding: .13rem .48rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 107, 107, .2)
        }

        .abtxt {
            font-size: .9rem;
            line-height: 1.85;
            color: var(--txt2)
        }

        #restaurantMap {
            height: 310px;
            border-radius: var(--r);
            overflow: hidden;
            border: 1px solid var(--brd)
        }

        .leaflet-tile {
            filter: brightness(.65) saturate(.5) hue-rotate(185deg)
        }

        .leaflet-container {
            background: var(--bg)
        }

        .leaflet-popup-content-wrapper {
            background: var(--bg2);
            color: var(--txt);
            border: 1px solid var(--brd2);
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .7)
        }

        .leaflet-popup-tip-container {
            display: none
        }

        .leaflet-popup-content {
            font-family: 'Outfit', sans-serif;
            font-size: .82rem;
            line-height: 1.5
        }

        .ngrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .9rem
        }

        .nc {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: var(--r);
            overflow: hidden;
            text-decoration: none;
            color: var(--txt);
            transition: all .25s;
            display: block
        }

        .nc:hover {
            border-color: var(--brd2);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, .35)
        }

        .nc-img {
            height: 115px;
            overflow: hidden;
            background: var(--bg3)
        }

        .nc-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .4s;
            display: block
        }

        .nc:hover .nc-img img {
            transform: scale(1.06)
        }

        .nc-body {
            padding: .82rem
        }

        .nc-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: .93rem;
            font-weight: 600;
            margin-bottom: .2rem;
            line-height: 1.2
        }

        .nc-meta {
            font-size: .71rem;
            color: var(--txt3)
        }

        .nc-dist {
            font-size: .68rem;
            font-weight: 600;
            color: var(--ac3);
            margin-top: .16rem;
            display: flex;
            align-items: center;
            gap: .25rem
        }

        .rvbar {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: var(--r);
            padding: 1.1rem 1.3rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 1.1rem
        }

        .rvn {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.7rem;
            font-weight: 700;
            line-height: 1;
            color: var(--ac)
        }

        .rvs {
            color: var(--ac2);
            font-size: .85rem
        }

        .rvc {
            font-size: .67rem;
            color: var(--txt3);
            margin-top: .08rem
        }

        .rvsep {
            width: 1px;
            height: 42px;
            background: var(--brd)
        }

        .rvbl {
            font-size: .81rem;
            color: var(--txt2);
            line-height: 1.65;
            max-width: 190px
        }

        .rvwrap {
            position: relative;
            max-height: 435px;
            overflow: hidden;
            transition: max-height .55s ease
        }

        .rvwrap.open {
            max-height: 9999px
        }

        .rvlist {
            display: flex;
            flex-direction: column;
            gap: .78rem
        }

        .rvc2 {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: var(--r);
            padding: 1.05rem;
            transition: border-color .2s
        }

        .rvc2:hover {
            border-color: var(--brd2)
        }

        .rvt {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: .42rem
        }

        .rvnm {
            font-weight: 600;
            font-size: .87rem;
            color: var(--txt)
        }

        .rvdt {
            font-size: .69rem;
            color: var(--txt3)
        }

        .rvst {
            color: var(--ac2);
            font-size: .78rem;
            margin-top: .1rem
        }

        .rvtx {
            font-size: .83rem;
            line-height: 1.7;
            color: var(--txt2)
        }

        .rvfade {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(transparent, var(--bg));
            pointer-events: none
        }

        .rvwrap.open .rvfade {
            display: none
        }

        .rvmbtn {
            display: block;
            margin: .72rem auto 0;
            background: none;
            border: 1px solid var(--brd2);
            color: var(--txt3);
            font-family: 'Outfit', sans-serif;
            font-size: .74rem;
            font-weight: 600;
            padding: .48rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all .2s
        }

        .rvmbtn:hover {
            border-color: var(--ac);
            color: var(--ac)
        }

        .bwrv {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            width: 100%;
            margin-top: .95rem;
            background: var(--bg3);
            border: 1px solid var(--brd2);
            color: var(--txt2);
            font-family: 'Outfit', sans-serif;
            font-size: .82rem;
            font-weight: 600;
            padding: .72rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all .2s
        }

        .bwrv:hover {
            border-color: var(--ac);
            color: var(--ac);
            background: rgba(255, 107, 107, .05)
        }

        .wra {
            transition: transform .3s;
            display: inline-block;
            font-size: .66rem;
            opacity: .5
        }

        .rfwrap {
            max-height: 0;
            overflow: hidden;
            transition: max-height .5s cubic-bezier(.4, 0, .2, 1)
        }

        .rfwrap.open {
            max-height: 900px
        }

        .rfcard {
            background: var(--bg2);
            border: 1px solid var(--brd);
            border-radius: var(--r);
            padding: 1.35rem;
            margin-top: .72rem
        }

        .rfcard h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.22rem;
            font-style: italic;
            color: var(--txt);
            margin-bottom: .95rem
        }

        .frow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .78rem
        }

        .fg {
            margin-bottom: .82rem
        }

        .fg label {
            display: block;
            font-size: .61rem;
            font-weight: 700;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--txt3);
            margin-bottom: .33rem
        }

        .fg input,
        .fg select,
        .fg textarea {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--brd);
            border-radius: 8px;
            padding: .58rem .8rem;
            font-family: 'Outfit', sans-serif;
            font-size: .83rem;
            color: var(--txt);
            transition: border-color .2s;
            -webkit-appearance: none
        }

        .fg input:focus,
        .fg select:focus,
        .fg textarea:focus {
            outline: none;
            border-color: var(--ac);
            background: var(--bg4)
        }

        .fg select option {
            background: var(--bg3)
        }

        .fg textarea {
            min-height: 88px;
            resize: vertical
        }

        .brsub {
            background: var(--ac);
            color: #fff;
            border: none;
            padding: .75rem;
            width: 100%;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: .85rem;
            cursor: pointer;
            transition: background .2s
        }

        .brsub:hover {
            background: #e85555
        }

        .rvok {
            display: none;
            background: rgba(81, 207, 102, .08);
            border: 1px solid rgba(81, 207, 102, .22);
            border-radius: 8px;
            padding: .68rem 1rem;
            margin-top: .68rem;
            color: var(--grn);
            font-size: .81rem;
            text-align: center
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(13, 13, 13, .97);
            color: var(--txt);
            padding: 10px 22px;
            border-radius: 30px;
            font-size: .81rem;
            font-family: 'Outfit', sans-serif;
            border: 1px solid rgba(255, 107, 107, .22);
            box-shadow: 0 8px 28px rgba(0, 0, 0, .5);
            z-index: 9999;
            transition: transform .35s cubic-bezier(.175, .885, .32, 1.275), opacity .3s;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1
        }

        .spinner {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2.5px solid var(--brd2);
            border-top-color: var(--ac);
            animation: spin .8s linear infinite;
            margin: 0 auto .85rem
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .lc {
            text-align: center;
            padding: 2.5rem;
            color: var(--txt3);
            font-size: .86rem
        }

        .gc {
            grid-column: 1/-1
        }
    </style>
</head>

<body>

    <div class="hero">
        <div class="hero-bg" id="hbg"></div>

                <div class="hrn" id="hrn">—</div>
                <div class="hrat-right">

                </div>
            </div>

    </div>
    <div class="anav">
        <div class="ainner">
            <button class="atab active" onclick="jt('sm');st(this)">Menu</button>
            <button class="atab" onclick="jt('sa');st(this)">About</button>
            <button class="atab" onclick="jt('srev');st(this)">Reviews</button>
            <button class="atab" onclick="jt('sn');st(this)">Nearby</button>

    </div>
    <div class="main">
        <!-- action buttons removed - links shown in ibar above -->

            </div>
            <div class="mtabs">

                    <button class="mtb" data-cat="fortwo"><i class="fa-solid fa-heart"></i> For Two</button>
                    <button class="mtb" data-cat="family"><i class="fa-solid fa-people-roof"></i> Family</button>
                    <button class="mtb" data-cat="drinks"><i class="fa-solid fa-wine-glass"></i> Drinks</button>

            <button class="rvmbtn" id="rvmbtn" style="display:none" onclick="tRv()">Show More Reviews</button>

                    class="wra" id="wra">▼</span></button>
            <div class="rfwrap" id="rfwrap">
                <div class="rfcard">
                    <h3>Share your experience</h3>
                    <div class="frow">
                        <div class="fg"><label>Your Name *</label><input type="text" id="rvname"
                                placeholder="e.g. Jasur T." /></div>

                            <select id="rvrat">
                                <option value="">Select…</option>
                                <option value="5">★★★★★ Excellent</option>
                                <option value="4">★★★★☆ Very Good</option>
                                <option value="3">★★★☆☆ Good</option>

                            </select>

                    </div>
                    <div class="fg"><label>Your Review *</label><textarea id="rvcom"
                            placeholder="What did you order? How was the service?"></textarea></div>
                    <button class="brsub" onclick="subRv()"><i class="fa-solid fa-paper-plane"></i> Submit
                        Review</button>

    </div>
    <div class="toast" id="toast"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // API defined in config.js
        let R = null, rid = null, upos = null, map = null, rl = null, rvLoaded = false;
        const esc = s => { if (s == null) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); };
        const sOf = n => { const c = Math.max(0, Math.min(5, Math.round(n))); return '★'.repeat(c) + '☆'.repeat(5 - c); };
        const fd = d => new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        function t(m, ms = 3400) { const e = document.getElementById('toast'); e.textContent = m; e.classList.add('show'); clearTimeout(e._t); e._t = setTimeout(() => e.classList.remove('show'), ms); }
        function jt(id) { document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
        function st(el) { document.querySelectorAll('.atab').forEach(x => x.classList.remove('active')); el.classList.add('active'); }
        async function gLoc() { if (!navigator.geolocation) return; try { const p = await new Promise((r, j) => navigator.geolocation.getCurrentPosition(r, j, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 })); upos = { lat: p.coords.latitude, lng: p.coords.longitude }; } catch (e) { upos = null; } }
        document.addEventListener('DOMContentLoaded', async () => {
            rid = new URLSearchParams(location.search).get('id');
            if (!rid) { document.getElementById('mgrid').innerHTML = '<div class="gc lc" style="color:var(--ac)">Missing ?id= in URL</div>'; return; }
            gLoc(); await init(); await loadRvs(); setupMTabs(); setupFav(); loadNearby();
        });
        async function init() {
            try {
                const r = await fetch(`${API}/restaurants/${rid}`); if (!r.ok) throw new Error(r.status === 404 ? 'Not found' : 'Error');
                R = await r.json(); buildHero(); buildIBar(); document.getElementById('abtxt').textContent = R.description || 'No description.';
                await loadMenu('solo'); initMap();
            } catch (e) { document.getElementById('mgrid').innerHTML = `<div class="gc lc" style="color:var(--ac)">${esc(e.message)}</div>`; }
        }
        function buildHero() {
            const bg = document.getElementById('hbg'); bg.style.backgroundImage = `url('${esc(R.image_url || '')}')`; setTimeout(() => bg.classList.add('loaded'), 100);
            const bd = []; if (R.is_partner) bd.push(`<span class="hb hb-p"><i class="fa-solid fa-crown"></i> Partner</span>`); if (R.cuisine_type) bd.push(`<span class="hb hb-c">${esc(R.cuisine_type)}</span>`);
            document.getElementById('hbadges').innerHTML = bd.join(''); document.getElementById('hname').textContent = R.name || 'Restaurant';
            const m = []; if (R.address) m.push(`<div class="hmi"><i class="fa-solid fa-location-dot"></i><strong>${esc(R.address)}</strong></div>`); if (R.opening_hours) m.push(`<div class="hmi"><i class="fa-regular fa-clock"></i>${esc(R.opening_hours)}</div>`); if (R.phone) m.push(`<div class="hmi"><i class="fa-solid fa-phone"></i>${esc(R.phone)}</div>`);
            document.getElementById('hmeta').innerHTML = m.join('');
            if (R.rating > 0) { document.getElementById('hrat').style.display = 'inline-flex'; document.getElementById('hrn').textContent = parseFloat(R.rating).toFixed(1); document.getElementById('hrs').textContent = sOf(R.rating); document.getElementById('hrc').textContent = `${R.review_count || 0} reviews`; }
            document.title = `${R.name} — Discover Uzbekistan`;
        }
        function buildIBar() {
            const items = [];
            if (R.address) items.push(`<div class="qi"><i class="fa-solid fa-location-dot"></i>${esc(R.address)}</div>`);
            if (R.phone) items.push(`<div class="qi"><i class="fa-solid fa-phone"></i><a href="tel:${esc(R.phone.replace(/\D/g, ''))}" style="color:var(--ac)">${esc(R.phone)}</a></div>`);
            if (R.opening_hours) items.push(`<div class="qi"><i class="fa-regular fa-clock" style="color:var(--ac)"></i>${esc(R.opening_hours)}</div>`);
            if (R.website) items.push(`<div class="qi"><i class="fa-solid fa-globe" style="color:#64b5f6"></i><a href="${esc(R.website)}" target="_blank" style="color:#64b5f6">${esc(R.website.replace(/^https?:\/\//, ''))}</a></div>`);
            if (R.instagram) { const l = R.instagram.startsWith('http') ? R.instagram : `https://instagram.com/${R.instagram.replace('@', '')}`; items.push(`<a href="${esc(l)}" target="_blank" class="qi-ig"><i class="fa-brands fa-instagram"></i>${esc(R.instagram.startsWith('@') ? R.instagram : '@' + R.instagram)}</a>`); }
            if (R.telegram) { let tl = R.telegram; if (!tl.startsWith('http')) tl = tl.startsWith('@') ? `https://t.me/${tl.replace('@', '')}` : `https://t.me/${tl}`; items.push(`<a href="${esc(tl)}" target="_blank" class="qi-tg"><i class="fa-brands fa-telegram"></i>${esc(R.telegram.startsWith('@') ? R.telegram : '@' + R.telegram)}</a>`); }
            document.getElementById('ibar').innerHTML = items.join('');
        }
        function buildActions() {
            const ar = document.getElementById('arow');
            let html = '';
            if (R?.website) html += `<button class="ab ab-s" onclick="window.open('${esc(R.website)}','_blank')"><i class="fa-solid fa-globe"></i> Website</button>`;
            if (R?.instagram) { const l = R.instagram.startsWith('http') ? R.instagram : `https://instagram.com/${R.instagram.replace('@', '')}`; html += `<button class="ab ab-ig" onclick="window.open('${esc(l)}','_blank')"><i class="fa-brands fa-instagram"></i> Instagram</button>`; }
            if (R?.telegram) { let tl = R.telegram; if (!tl.startsWith('http')) tl = tl.startsWith('@') ? `https://t.me/${tl.replace('@', '')}` : `https://t.me/${tl}`; html += `<button class="ab ab-tg" onclick="window.open('${esc(tl)}','_blank')"><i class="fa-brands fa-telegram"></i> Telegram</button>`; }
            ar.innerHTML = html;
        }
        function setupFav() { const btn = document.getElementById('favBtn'), k = `fav_r_${rid}`; if (localStorage.getItem(k) === '1') { btn.classList.add('liked'); btn.innerHTML = '<i class="fa-solid fa-heart"></i>'; } btn.onclick = () => { const s = btn.classList.toggle('liked'); btn.innerHTML = s ? '<i class="fa-solid fa-heart"></i>' : '<i class="fa-regular fa-heart"></i>'; if (s) localStorage.setItem(k, '1'); else localStorage.removeItem(k); }; }
        function callR() { if (R?.phone) window.location.href = `tel:${R.phone.replace(/\D/g, '')}`; }
        async function loadMenu(cat) {
            const gr = document.getElementById('mgrid'); gr.innerHTML = '<div class="gc lc"><div class="spinner"></div>Loading…</div>';
            document.getElementById('catpill').textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
            try {
                const r = await fetch(`${API}/restaurants/${R.id}/menu?category=${cat}`); const items = await r.json();
                if (!items.length) { gr.innerHTML = '<div class="gc lc" style="color:var(--txt3)">No items in this category</div>'; return; }
                gr.innerHTML = items.map(i => `<div class="mc">
      <div class="mc-img">${i.image_url ? `<img src="${esc(i.image_url)}" alt="${esc(i.item_name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=mc-ph>🍽</div>'"/>` : `<div class="mc-ph">🍽</div>`}</div>
      <div class="mc-body">
        <div class="mc-name">${esc(i.item_name)}</div>
        ${i.description ? `<div class="mc-desc">${esc(i.description)}</div>` : ''}
        <div class="mc-foot">
          <div class="mc-price">$${Number(i.price).toFixed(2)}</div>
          ${i.tags ? `<div class="mc-tags">${i.tags.split(',').map(x => `<span class="mc-tag">${esc(x.trim())}</span>`).join('')}</div>` : ''}
        </div>
      </div></div>`).join('');
            } catch (e) { gr.innerHTML = '<div class="gc lc" style="color:var(--ac)">Could not load menu</div>'; }
        }
        function setupMTabs() { document.querySelectorAll('.mtb').forEach(b => { b.addEventListener('click', function () { document.querySelectorAll('.mtb').forEach(x => x.classList.remove('active')); this.classList.add('active'); loadMenu(this.dataset.cat); }); }); }
        function initMap() {
            if (!R?.latitude || !R?.longitude) { document.getElementById('restaurantMap').innerHTML = '<div class="lc" style="color:var(--txt3)">No location data</div>'; return; }
            map = L.map('restaurantMap', { zoomControl: true }).setView([R.latitude, R.longitude], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);
            const ic = L.divIcon({ className: '', html: `<div style="width:14px;height:14px;border-radius:50%;background:var(--ac);border:3px solid #fff;box-shadow:0 2px 10px rgba(255,107,107,.5)"></div>`, iconSize: [14, 14], iconAnchor: [7, 7] });
            L.marker([R.latitude, R.longitude], { icon: ic }).addTo(map).bindPopup(`<b>${esc(R.name)}</b>${R.address ? `<br>${esc(R.address)}` : ''}`, { maxWidth: 180 }).openPopup();
        }
        function addUsr() {
            if (!map || !upos) return;
            const ui = L.divIcon({ className: '', html: '<div style="width:12px;height:12px;border-radius:50%;background:#4ecdc4;border:2.5px solid #fff;box-shadow:0 0 10px #4ecdc4"></div>', iconSize: [12, 12], iconAnchor: [6, 6] });
            L.marker([upos.lat, upos.lng], { icon: ui }).addTo(map).bindPopup('📍 You are here');
            L.polyline([[upos.lat, upos.lng], [R.latitude, R.longitude]], { color: '#ff6b6b', weight: 2.5, opacity: .4, dashArray: '7 5' }).addTo(map);
            map.fitBounds([[upos.lat, upos.lng], [R.latitude, R.longitude]], { padding: [45, 45] });
        }
        function getDir() {
            if (!map) { t('⏳ Map loading…'); return; } if (!upos) { t('📍 Enable location access first'); return; }
            fetch(`https://router.project-osrm.org/route/v1/driving/${upos.lng},${upos.lat};${R.longitude},${R.latitude}?overview=full&geometries=geojson`)
                .then(r => r.json()).then(d => { if (d.code !== 'Ok' || !d.routes?.length) throw new Error(); if (rl) map.removeLayer(rl); const c = d.routes[0].geometry.coordinates.map(x => [x[1], x[0]]); rl = L.polyline(c, { color: '#ff6b6b', weight: 5, opacity: .85, lineCap: 'round' }); rl.addTo(map); map.fitBounds(rl.getBounds(), { padding: [55, 55] }); t(`🗺 ${(d.routes[0].distance / 1000).toFixed(1)} km · ~${Math.round(d.routes[0].duration / 60)} min`); })
                .catch(() => t('⚠️ Could not calculate route'));
        }
        async function loadNearby() {
            await gLoc(); const gr = document.getElementById('ngrid');
            if (!upos) { gr.innerHTML = '<div class="gc lc" style="color:var(--txt3)">Enable location to see nearby restaurants</div>'; if (map) addUsr(); return; }
            if (map) addUsr();
            try {
                const r = await fetch(`${API}/restaurants`); const all = await r.json();
                const nb = all.filter(x => { if (x.id === R?.id) return false; x._d = dd(upos.lat, upos.lng, x.latitude, x.longitude); return x._d <= 20; }).sort((a, b) => a._d - b._d).slice(0, 6);
                if (!nb.length) { gr.innerHTML = '<div class="gc lc" style="color:var(--txt3)">No restaurants within 20 km</div>'; return; }
                gr.innerHTML = nb.map(x => `<a href="restaurants.html?id=${parseInt(x.id)}" class="nc">
      <div class="nc-img"><img src="${esc(x.image_url || '')}" alt="${esc(x.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=height:100%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:var(--bg3)>🍽</div>'"/></div>
      <div class="nc-body"><div class="nc-name">${esc(x.name)}</div><div class="nc-meta">${esc(x.cuisine_type || 'Restaurant')}</div><div class="nc-dist"><i class="fa-solid fa-location-dot"></i>${x._d.toFixed(1)} km${x.rating ? ` · ★ ${parseFloat(x.rating).toFixed(1)}` : ''}</div></div>
    </a>`).join('');
            } catch (e) { gr.innerHTML = '<div class="gc lc" style="color:var(--ac)">Could not load nearby</div>'; }
        }
        async function loadRvs() {
            if (rvLoaded) return;
            try {
                const r = await fetch(`${API}/restaurants/${rid}/reviews`); const rv = await r.json(); rvLoaded = true;
                const avg = rv.length ? rv.reduce((s, x) => s + x.rating, 0) / rv.length : 0;
                document.getElementById('rvp').textContent = rv.length;
                document.getElementById('rvavg').textContent = avg > 0 ? avg.toFixed(1) : '—';
                document.getElementById('rvsts').textContent = avg > 0 ? sOf(avg) : '☆☆☆☆☆';
                document.getElementById('rvcnt').textContent = `${rv.length} review${rv.length !== 1 ? 's' : ''}`;
                document.getElementById('rvbl').textContent = avg >= 4.5 ? '🏆 Exceptional — highly recommended!' : avg >= 4 ? '👍 Well rated by diners.' : avg > 0 ? 'Rated by guests.' : 'No reviews yet — be the first!';
                if (!rv.length) { document.getElementById('rvlist').innerHTML = '<div class="lc" style="color:var(--txt3)">No reviews yet.</div>'; document.getElementById('rvfade').style.display = 'none'; return; }
                document.getElementById('rvlist').innerHTML = rv.map(x => `<div class="rvc2"><div class="rvt"><div><div class="rvnm">${esc(x.reviewer_name || 'Anonymous')}</div><div class="rvst">${sOf(x.rating)}</div></div><div class="rvdt">${fd(x.created_at)}</div></div><div class="rvtx">${esc(x.comment || '')}</div></div>`).join('');
                if (rv.length > 3) document.getElementById('rvmbtn').style.display = 'block'; else document.getElementById('rvfade').style.display = 'none';
            } catch (e) { document.getElementById('rvlist').innerHTML = '<div class="lc" style="color:var(--ac)">Could not load reviews</div>'; }
        }
        function tRv() { const w = document.getElementById('rvwrap'), b = document.getElementById('rvmbtn'); w.classList.toggle('open'); b.textContent = w.classList.contains('open') ? 'Show Less Reviews' : 'Show More Reviews'; }
        function tRvF() { const w = document.getElementById('rfwrap'), a = document.getElementById('wra'); w.classList.toggle('open'); if (a) a.style.transform = w.classList.contains('open') ? 'rotate(180deg)' : ''; if (w.classList.contains('open')) setTimeout(() => w.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80); }
        async function subRv() {
            const nm = document.getElementById('rvname').value.trim(), rt = parseInt(document.getElementById('rvrat').value), cm = document.getElementById('rvcom').value.trim();
            if (!nm || !rt || !cm) { t('⚠️ Fill in name, rating and review'); return; }
            try { const r = await fetch(`${API}/restaurants/reviews`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ restaurant_id: parseInt(rid), reviewer_name: nm, rating: rt, comment: cm }) }); if (!r.ok) throw new Error();['rvname', 'rvcom'].forEach(id => document.getElementById(id).value = ''); document.getElementById('rvrat').value = ''; const ok = document.getElementById('rvok'); ok.style.display = 'block'; setTimeout(() => ok.style.display = 'none', 5000); rvLoaded = false; await loadRvs(); }
            catch (e) { t('⚠️ Could not submit: ' + e.message); }
        }
        function shareR() { if (!R) return; const d = { title: R.name, text: `Check out ${R.name} on Discover Uzbekistan!`, url: location.href }; if (navigator.share) navigator.share(d).catch(() => { }); else navigator.clipboard?.writeText(location.href).then(() => t('🔗 Link copied!')).catch(() => t('⚠️ Could not copy')); }
        function dd(a, b, c, d) { const R = 6371, dL = (c - a) * Math.PI / 180, dN = (d - b) * Math.PI / 180; const x = Math.sin(dL / 2) ** 2 + Math.cos(a * Math.PI / 180) * Math.cos(c * Math.PI / 180) * Math.sin(dN / 2) ** 2; return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x)); }
        (function () { const id = new URLSearchParams(location.search).get('id'); if (!id) return; const sid = sessionStorage.getItem('_as') || ('s' + Date.now() + Math.random().toString(36).substr(2, 8)); sessionStorage.setItem('_as', sid); const t0 = Date.now(); let sent = false; function send() { if (sent) return; sent = true; const d = { page_type: 'restaurant', page_id: parseInt(id), partner_id: parseInt(id), time_spent: Math.floor((Date.now() - t0) / 1000), session_id: sid }; navigator.sendBeacon ? navigator.sendBeacon(`${API}/api/analytics/track`, new Blob([JSON.stringify(d)], { type: 'application/json' })) : fetch(`${API}/api/analytics/track`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(d), keepalive: true }).catch(() => { }); } window.addEventListener('beforeunload', send); document.addEventListener('visibilitychange', () => { if (document.hidden) send(); }); })();
    </script>
