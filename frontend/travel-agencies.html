<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Agencies - Discover Uzbekistan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: white;
        }

        /* Header */
        header {
            background: #000;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .page-subtitle {
            font-size: 18px;
            opacity: 0.7;
        }

        /* Filters */
        .filters {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-label {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 8px;
            display: block;
        }

        .filter-select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .filter-select option {
            background: #1a1a1a;
        }

        .results-count {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        /* Agencies Grid */
        .agencies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .agency-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .agency-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
        }

        .agency-image {
            height: 220px;
            background-size: cover;
            background-position: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 48px;
        }

        .agency-info {
            padding: 20px;
        }

        .agency-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .agency-type {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .agency-meta {
            display: flex;
            gap: 15px;
            font-size: 13px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.8;
        }

        .rating {
            color: #ffd700;
        }

        .tours-count {
            color: #4CAF50;
        }

        .verified-badge {
            background: #10b981;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .partner-badge {
            background: #9c27b0;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .featured-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .specializations {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .spec-tag {
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.4);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            color: #a5b4fc;
        }

        .view-btn {
            width: 100%;
            padding: 12px;
            background: #ff6b35;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .view-btn:hover {
            background: #ff5722;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-title {
                font-size: 32px;
            }

            .filters {
                flex-direction: column;
            }

            .filter-group {
                width: 100%;
            }

            .agencies-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </header>

    <!-- Main Container -->
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">✈️ Travel Agencies & Tour Operators</h1>
            <p class="page-subtitle">Professional tour guides and customized travel packages across Uzbekistan</p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label class="filter-label">City</label>
                <select class="filter-select" id="cityFilter" onchange="filterAgencies()">
                    <option value="all">All Cities</option>
                    <option value="tashkent">Tashkent</option>
                    <option value="samarkand">Samarkand</option>
                    <option value="bukhara">Bukhara</option>
                    <option value="khiva">Khiva</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Tour Type</label>
                <select class="filter-select" id="typeFilter" onchange="filterAgencies()">
                    <option value="all">All Types</option>
                    <option value="cultural">Cultural Tours</option>
                    <option value="adventure">Adventure Tours</option>
                    <option value="luxury">Luxury Tours</option>
                    <option value="silk_road">Silk Road Tours</option>
                    <option value="group">Group Tours</option>
                    <option value="private">Private Tours</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Sort By</label>
                <select class="filter-select" id="sortFilter" onchange="filterAgencies()">
                    <option value="rating">Rating</option>
                    <option value="tours">Most Tours</option>
                    <option value="name">Name</option>
                </select>
            </div>
        </div>

        <div class="results-count" id="resultsCount">Loading travel agencies...</div>

        <!-- Agencies Grid -->
        <div class="agencies-grid" id="agenciesGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading travel agencies...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000';
        let allAgencies = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadAgencies();
        });

        async function loadAgencies() {
            try {
                const response = await fetch(`${API_BASE_URL}/travel-agencies`);
                if (!response.ok) throw new Error('Failed to load travel agencies');

                allAgencies = await response.json();
                displayAgencies(allAgencies);
            } catch (error) {
                console.error('Error loading agencies:', error);
                document.getElementById('agenciesGrid').innerHTML =
                    '<p style="text-align:center; color:#ff4444;">Failed to load travel agencies. Please try again.</p>';
            }
        }

        function displayAgencies(agencies) {
            const grid = document.getElementById('agenciesGrid');
            const resultsCount = document.getElementById('resultsCount');

            resultsCount.textContent = `Showing ${agencies.length} travel agenc${agencies.length !== 1 ? 'ies' : 'y'}`;

            if (agencies.length === 0) {
                grid.innerHTML = '<p style="text-align:center; opacity:0.6;">No travel agencies found</p>';
                return;
            }

            const gradients = [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
                'linear-gradient(135deg, #30cfd0 0%, #330867 100%)'
            ];

            const icons = ['✈️', '🗺️', '🧳', '🎒', '🚐', '🏔️'];

            grid.innerHTML = agencies.map((a, index) => `
                <div class="agency-card" onclick="window.location.href='travel-agency.html?id=${a.id}'">
                    ${a.is_featured ? '<div class="featured-badge"><i class="fas fa-star"></i> Featured</div>' : ''}
                    <div class="agency-image" style="background: ${a.logo_url ? `url(${API_BASE_URL}${a.logo_url})` : gradients[index % gradients.length]}; background-size: cover;">
                        ${!a.logo_url ? icons[index % icons.length] : ''}
                    </div>
                    <div class="agency-info">
                        <div class="agency-name">${a.name}</div>
                        <div class="agency-type"><i class="fas fa-building"></i> ${a.agency_type || 'Tour Operator'}</div>
                        
                        ${a.specializations && a.specializations.length > 0 ? `
                            <div class="specializations">
                                ${a.specializations.slice(0, 3).map(s => `<div class="spec-tag">${s}</div>`).join('')}
                            </div>
                        ` : ''}
                        
                        <div class="agency-meta">
                            ${a.rating ? `<div class="meta-item rating"><i class="fas fa-star"></i> ${a.rating.toFixed(1)}</div>` : ''}
                            ${a.tours_count ? `<div class="meta-item tours-count"><i class="fas fa-route"></i> ${a.tours_count} tours</div>` : ''}
                            ${a.is_verified ? '<div class="verified-badge"><i class="fas fa-check-circle"></i> Verified</div>' : ''}
                            ${a.is_partner ? '<div class="partner-badge"><i class="fas fa-crown"></i> Partner</div>' : ''}
                        </div>
                        
                        <div class="meta-item" style="font-size: 13px; opacity: 0.7; margin-bottom: 8px;">
                            <i class="fas fa-users"></i> ${a.languages || 'English, Russian, Uzbek'}
                        </div>
                        
                        <div class="meta-item" style="font-size: 13px; opacity: 0.7;">
                            <i class="fas fa-phone"></i> ${a.phone || 'Not available'}
                        </div>
                        
                        <button class="view-btn" onclick="event.stopPropagation(); window.location.href='travel-agency.html?id=${a.id}'">
                            <i class="fas fa-info-circle"></i> View Tours & Packages
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterAgencies() {
            const cityFilter = document.getElementById('cityFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const sortFilter = document.getElementById('sortFilter').value;

            let filtered = allAgencies.filter(a => {
                const cityMatch = cityFilter === 'all' || (a.city && a.city.toLowerCase().includes(cityFilter));
                const typeMatch = typeFilter === 'all' || (a.specializations && a.specializations.some(s => s.toLowerCase().includes(typeFilter.replace('_', ' '))));
                return cityMatch && typeMatch;
            });

            // Sort
            if (sortFilter === 'rating') {
                filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
            } else if (sortFilter === 'tours') {
                filtered.sort((a, b) => (b.tours_count || 0) - (a.tours_count || 0));
            } else if (sortFilter === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            }

            displayAgencies(filtered);
        }
    </script>
</body>

</html>
