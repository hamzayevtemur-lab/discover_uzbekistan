<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Login - Discover Uzbekistan</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 440px;
      padding: 3rem;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }

    .logo p {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #374151;
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 0.9rem 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .alert.active {
      display: block;
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border-left: 4px solid #ef4444;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
      border-left: 4px solid #10b981;
    }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #6b7280;
    }

    .footer-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }
  </style>
  
</head>

<body>
  <div class="card">
    <div class="logo">
      <h1>🏨 Partner Login</h1>
      <p>Sign in to manage your business</p>
    </div>

    <div class="alert alert-error" id="error-msg"></div>
    <div class="alert alert-success" id="success-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
    </form>

    <div class="footer-link">
      Don't have an account? <a href="/partner-portal.html">Apply as Partner</a>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8000';

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('error-msg');
      const sucEl = document.getElementById('success-msg');

      errEl.classList.remove('active');
      sucEl.classList.remove('active');
      btn.disabled = true;
      btn.textContent = '⏳ Signing in…';

      try {
        const resp = await fetch(`${API}/api/partner-applications/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await resp.json();

        if (!resp.ok) throw new Error(data.detail || 'Login failed.');

        // ── Store all partner info ──
        localStorage.setItem('partner_token', data.access_token);
        localStorage.setItem('partner_email', email);
        localStorage.setItem('partner_type', data.business_type);
        localStorage.setItem('partner_name', data.business_name);
        localStorage.setItem('partner_record_id', data.record_id);

        // Store the specific ID key each dashboard needs
        if (data.business_type === 'hotel') {
          localStorage.setItem('hotel_id', data.record_id);
        } else if (data.business_type === 'restaurant') {
          localStorage.setItem('restaurant_id', data.record_id);
        } else if (data.business_type === 'travel_agency') {
          localStorage.setItem('agency_id', data.record_id);
        }

        // ── Show success ──
        sucEl.textContent = `✅ Welcome back, ${data.business_name}! Redirecting…`;
        sucEl.classList.add('active');

        // ── Build correct dashboard URL ──
        setTimeout(() => {
          const dashboardPages = {
            restaurant: `/restaurants-admin-portal.html?id=${data.record_id}`,
            hotel: `/hotel-admin-dashboard.html?id=${data.record_id}`,
            travel_agency: `/travel-agency-admin-dashboard.html?id=${data.record_id}`,
          };

          const url = dashboardPages[data.business_type];
          if (url) {
            window.location.href = url;
          } else if (data.dashboard_url) {
            // Fallback to server-provided URL
            window.location.href = data.dashboard_url.startsWith('http')
              ? data.dashboard_url
              : `http://localhost:8000${data.dashboard_url}`;
          } else {
            throw new Error('Unknown business type. Please contact support.');
          }
        }, 1000);

      } catch (err) {
        errEl.textContent = '❌ ' + err.message;
        errEl.classList.add('active');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>

</html>
