<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Admin — Discover Uzbekistan</title>
    <script src="/config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f0f13;
            --surface: #18181f;
            --surface2: #1e1e27;
            --border: #2a2a38;
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --info: #3b82f6;
            --info-bg: rgba(59, 130, 246, 0.1);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --text3: #64748b;
            --radius: 12px;
            --radius-lg: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* LOGIN */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0f13, #1a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin: 0 auto 1.5rem;
        }

        .login-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 0.4rem;
        }

        .login-sub {
            color: var(--text3);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .login-error {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.75rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            display: none;
        }

        .login-input {
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text);
            margin-bottom: 1rem;
            box-sizing: border-box;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        /* LAYOUT */
        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            transition: transform 0.3s;
        }

        .sidebar-logo {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sidebar-logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .sidebar-logo-text {
            font-weight: 800;
            font-size: 0.95rem;
        }

        .sidebar-logo-sub {
            font-size: 0.7rem;
            color: var(--text3);
        }

        .sidebar-nav {
            flex: 1;
            padding: 0.875rem;
            overflow-y: auto;
        }

        .nav-section-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text3);
            padding: 0.5rem 0.75rem;
            margin-top: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 0.875rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text2);
            transition: all 0.15s;
            margin-bottom: 2px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .nav-item:hover {
            background: rgba(99, 102, 241, 0.08);
            color: var(--text);
        }

        .nav-item.active {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
        }

        .nav-icon {
            width: 20px;
            text-align: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 0.875rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text3);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            transition: all 0.15s;
        }

        .logout-btn:hover {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .main {
            margin-left: 220px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.75rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: 1rem;
            font-weight: 700;
        }

        .content {
            padding: 1.75rem;
            flex: 1;
        }

        .section {
            display: none;
            animation: fadeIn 0.2s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* STATS */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent, var(--primary));
        }

        .stat-num {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .stat-lbl {
            font-size: 0.72rem;
            color: var(--text3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
        }

        /* NEWS CARDS GRID */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .news-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.2s;
        }

        .news-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .news-card.inactive {
            opacity: 0.5;
        }

        .news-card-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: var(--border);
        }

        .news-card-img-placeholder {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            background: linear-gradient(135deg, #1e1e27, #2a2a38);
        }

        .news-card-body {
            padding: 1.1rem;
        }

        .news-card-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 0.4rem;
            line-height: 1.35;
        }

        .news-card-desc {
            font-size: 0.8rem;
            color: var(--text2);
            line-height: 1.5;
            margin-bottom: 0.6rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-card-meta {
            font-size: 0.75rem;
            color: var(--text3);
            margin-bottom: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .news-card-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        /* BADGES */
        .badge {
            display: inline-flex;
            padding: 0.2rem 0.55rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .badge-success {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-warning {
            background: var(--warning-bg);
            color: var(--warning);
        }

        .badge-danger {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .badge-muted {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text3);
        }

        .badge-news {
            background: var(--info-bg);
            color: #60a5fa;
        }

        .badge-event {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-holiday {
            background: rgba(236, 72, 153, 0.1);
            color: #f472b6;
        }

        .badge-announcement {
            background: var(--warning-bg);
            color: var(--warning);
        }

        /* FORM */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .form-group.full {
            grid-column: 1/-1;
        }

        label {
            font-size: 0.73rem;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .opt {
            font-weight: 400;
            text-transform: none;
            color: var(--text3);
            font-size: 0.7rem;
        }

        input[type=text],
        input[type=number],
        input[type=url],
        input[type=tel],
        input[type=date],
        select,
        textarea {
            padding: 0.65rem 0.9rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            font-family: inherit;
            color: var(--text);
            transition: border-color 0.2s;
            width: 100%;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        input[type=file] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem;
            color: var(--text2);
            width: 100%;
        }

        /* BUTTONS */
        .btn {
            padding: 0.55rem 1.1rem;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .btn-success:hover {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary-light);
        }

        .btn-warning {
            background: var(--warning-bg);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
        }

        /* IMAGE */
        .img-preview {
            max-width: 100%;
            max-height: 180px;
            border-radius: 8px;
            margin-top: 0.5rem;
            display: none;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .img-preview.show {
            display: block;
        }

        .upload-progress {
            display: none;
            margin-top: 0.5rem;
            background: var(--info-bg);
            border-radius: 8px;
            padding: 0.5rem 0.875rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: #60a5fa;
        }

        .upload-progress.show {
            display: block;
        }

        /* MAP */
        #news-map {
            height: 260px;
            border-radius: 8px;
            margin-top: 0.75rem;
            border: 1px solid var(--border);
            display: none;
        }

        #news-map.show {
            display: block;
        }

        .map-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 0.45rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            margin-top: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .map-toggle:hover {
            border-color: var(--primary);
            color: var(--primary-light);
        }

        /* SECTION DIVIDER */
        .section-divider {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text3);
            margin: 1.25rem 0 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }

        /* FILTER BAR */
        .filter-bar {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem;
            align-items: center;
        }

        select.filter-select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.82rem;
            cursor: pointer;
        }

        select.filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            padding: 0.875rem 1.25rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.875rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            max-width: 320px;
            border: 1px solid;
        }

        .toast-success {
            background: #0d2d1f;
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .toast-error {
            background: #2d0d0d;
            color: var(--danger);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .toast-info {
            background: #0d1a2d;
            color: #60a5fa;
            border-color: rgba(59, 130, 246, 0.3);
        }

        @keyframes slideIn {
            from {
                transform: translateX(110%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .empty {
            text-align: center;
            padding: 2.5rem;
            color: var(--text3);
        }

        .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        /* MOBILE */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        @media(max-width:1024px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .stats-row {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media(max-width:768px) {
            .content {
                padding: 1rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full {
                grid-column: 1;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }

            .stats-row {
                grid-template-columns: repeat(3, 1fr);
            }

            .topbar {
                padding: 0 1rem;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-logo">📰</div>
            <h2 class="login-title">News Admin</h2>
            <p class="login-sub">Discover Uzbekistan — News & Events Manager</p>
            <div class="login-error" id="loginError">❌ Incorrect password</div>
            <input type="password" id="loginInput" class="login-input" placeholder="Enter password"
                onkeydown="if(event.key==='Enter') doLogin()">
            <button class="login-btn" onclick="doLogin()">Sign In →</button>
        </div>
    </div>

    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">📰</div>
                <div>
                    <div class="sidebar-logo-text">News Admin</div>
                    <div class="sidebar-logo-sub">Events & Announcements</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">News & Events</div>
                <button class="nav-item active" onclick="showSection('all',this)">
                    <span class="nav-icon">📋</span> All Items
                </button>
                <button class="nav-item" onclick="showSection('create',this);resetForm()">
                    <span class="nav-icon">➕</span> Create New
                </button>
            </nav>
            <div class="sidebar-footer">
                <button class="logout-btn" onclick="logout()"><span>🚪</span> Logout</button>
            </div>
        </aside>

        <div class="main">
            <div class="topbar">
                <div style="display:flex;align-items:center;gap:1rem;">
                    <button class="mobile-menu-btn"
                        onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                    <div class="topbar-title" id="topbarTitle">All News & Events</div>
                </div>
            </div>

            <div class="content">

                <!-- ALL -->
                <div id="section-all" class="section active">
                    <div class="stats-row">
                        <div class="stat-card" style="--accent:var(--primary);">
                            <div class="stat-num" id="statTotal">—</div>
                            <div class="stat-lbl">Total</div>
                        </div>
                        <div class="stat-card" style="--accent:var(--success);">
                            <div class="stat-num" style="color:var(--success);" id="statActive">—</div>
                            <div class="stat-lbl">Active Now</div>
                        </div>
                        <div class="stat-card" style="--accent:var(--danger);">
                            <div class="stat-num" style="color:var(--danger);" id="statExpired">—</div>
                            <div class="stat-lbl">Expired</div>
                        </div>
                    </div>

                    <div class="filter-bar">
                        <select id="filterCategory" class="filter-select" onchange="filterNews()">
                            <option value="">All Categories</option>
                            <option value="news">📰 News</option>
                            <option value="event">🎉 Event</option>
                            <option value="holiday">🎊 Holiday</option>
                            <option value="announcement">📢 Announcement</option>
                        </select>
                        <select id="filterStatus" class="filter-select" onchange="filterNews()">
                            <option value="">All Status</option>
                            <option value="active">✅ Active</option>
                            <option value="inactive">⏸ Hidden</option>
                        </select>
                        <button class="btn btn-secondary btn-sm" onclick="loadNews()">↻ Refresh</button>
                        <button class="btn btn-primary btn-sm"
                            onclick="showSection('create',document.querySelector('[onclick*=create]'));resetForm()">➕
                            New</button>
                    </div>

                    <div class="news-grid" id="newsGrid">
                        <div class="empty">
                            <div class="empty-icon">⏳</div>
                            <p>Loading…</p>
                        </div>
                    </div>
                </div>

                <!-- CREATE / EDIT -->
                <div id="section-create" class="section">
                    <div class="card">
                        <div class="card-header">
                            <div class="card-title" id="formTitle">Create News / Event</div>
                            <button class="btn btn-secondary btn-sm"
                                onclick="showSection('all',document.querySelector('[onclick*=all]'));loadNews()">←
                                Back</button>
                        </div>

                        <div id="formSuccess"
                            style="background:var(--success-bg);color:var(--success);border:1px solid rgba(16,185,129,0.3);padding:0.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-weight:600;display:none;">
                        </div>
                        <div id="formError"
                            style="background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,68,68,0.3);padding:0.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-weight:600;display:none;">
                        </div>
                        <input type="hidden" id="editId">

                        <div class="form-grid">
                            <div class="form-group full">
                                <label>Title *</label>
                                <input type="text" id="nTitle" placeholder="Navruz Festival 2026…">
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <select id="nCategory">
                                    <option value="news">📰 News</option>
                                    <option value="event">🎉 Event</option>
                                    <option value="holiday">🎊 Holiday</option>
                                    <option value="announcement">📢 Announcement</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Visible on Homepage</label>
                                <select id="nActive">
                                    <option value="true" selected>✅ Yes — show on homepage</option>
                                    <option value="false">⏸ No — hidden</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Start Date *</label>
                                <input type="date" id="nStartDate">
                            </div>
                            <div class="form-group">
                                <label>End Date <span class="opt">(optional — for events)</span></label>
                                <input type="date" id="nEndDate">
                            </div>
                            <div class="form-group full">
                                <label>Short Description</label>
                                <textarea id="nDescription"
                                    placeholder="Brief summary shown on the homepage…"></textarea>
                            </div>
                            <div class="form-group full">
                                <label>Photo <span class="opt">(optional)</span></label>
                                <input type="file" id="nImageFile" accept="image/*" onchange="uploadNewsImage(this)">
                                <input type="text" id="nImageUrl" placeholder="Or paste image URL"
                                    style="margin-top:0.5rem;" oninput="showPreview(this.value,'nImagePreview')">
                                <div class="upload-progress" id="uploadProgress">⏳ Uploading…</div>
                                <img id="nImagePreview" class="img-preview" alt="Preview">
                            </div>
                        </div>

                        <div class="section-divider">📍 Location & Contact <span class="opt">(all optional)</span></div>

                        <div class="form-grid">
                            <div class="form-group full">
                                <label>Location Name <span class="opt">(e.g. Registan Square, Samarkand)</span></label>
                                <input type="text" id="nLocationName" placeholder="Venue or city name">
                            </div>
                            <div class="form-group">
                                <label>Latitude <span class="opt">(click map to set)</span></label>
                                <input type="number" id="nLat" step="0.000001" placeholder="39.654671"
                                    oninput="updateMapFromInputs()">
                            </div>
                            <div class="form-group">
                                <label>Longitude</label>
                                <input type="number" id="nLng" step="0.000001" placeholder="66.975965"
                                    oninput="updateMapFromInputs()">
                            </div>
                            <div class="form-group full">
                                <button type="button" class="map-toggle" onclick="toggleMap()">🗺️ Pick location on
                                    map</button>
                                <div id="news-map"></div>
                                <p style="font-size:0.72rem;color:var(--text3);margin-top:0.4rem;">Click map to set
                                    exact coordinates</p>
                            </div>
                            <div class="form-group">
                                <label>Phone <span class="opt">(contact number)</span></label>
                                <input type="tel" id="nPhone" placeholder="+998 90 123 4567">
                            </div>
                            <div class="form-group">
                                <label>Telegram <span class="opt">(@username)</span></label>
                                <input type="text" id="nTelegram" placeholder="@eventname">
                            </div>
                            <div class="form-group">
                                <label>Instagram <span class="opt">(@username)</span></label>
                                <input type="text" id="nInstagram" placeholder="@eventname">
                            </div>
                        </div>

                        <div style="display:flex;gap:0.75rem;margin-top:1.5rem;flex-wrap:wrap;">
                            <button class="btn btn-primary" onclick="saveNews()">💾 Save</button>
                            <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const SESSION_KEY = 'news_admin_auth';
        let allNews = [];
        let nMap = null, nMarker = null, mapVisible = false;

        (function () {
            if (sessionStorage.getItem(SESSION_KEY)) {
                document.getElementById('loginOverlay').style.display = 'none';
                init();
            }
        })();

        async function doLogin() {
            const pw = document.getElementById('loginInput').value;
            const err = document.getElementById('loginError');
            err.style.display = 'none';
            try {
                const res = await fetch(`${API}/admin/news-admin/verify-login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                });
                if (res.ok) {
                    const d = await res.json();
                    sessionStorage.setItem(SESSION_KEY, d.token);
                    document.getElementById('loginOverlay').style.display = 'none';
                    init();
                } else {
                    err.style.display = 'block';
                    document.getElementById('loginInput').value = '';
                }
            } catch (e) { err.textContent = '❌ Cannot connect.'; err.style.display = 'block'; }
        }

        function logout() { sessionStorage.removeItem(SESSION_KEY); location.reload(); }
        function init() { loadNews(); }

        function showSection(name, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(`section-${name}`).classList.add('active');
            if (btn) btn.classList.add('active');
            document.getElementById('topbarTitle').textContent =
                name === 'all' ? 'All News & Events' : 'Create News / Event';
            document.getElementById('sidebar').classList.remove('open');
            if (name === 'all') loadNews();
        }

        async function loadNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><p>Loading…</p></div>';
            try {
                const res = await fetch(`${API}/api/news/admin/all`);
                allNews = await res.json();
                updateStats();
                renderNews(allNews);
            } catch (e) {
                grid.innerHTML = '<div class="empty" style="color:var(--danger);">Failed to load.</div>';
            }
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            let active = 0, expired = 0;
            allNews.forEach(n => {
                if (!n.is_active) return;
                if (n.end_date && n.end_date < today) expired++;
                else active++;
            });
            document.getElementById('statTotal').textContent = allNews.length;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statExpired').textContent = expired;
        }

        function filterNews() {
            const cat = document.getElementById('filterCategory').value;
            const status = document.getElementById('filterStatus').value;
            let list = allNews;
            if (cat) list = list.filter(n => n.category === cat);
            if (status === 'active') list = list.filter(n => n.is_active);
            if (status === 'inactive') list = list.filter(n => !n.is_active);
            renderNews(list);
        }

        const CAT_CLASS = { news: 'badge-news', event: 'badge-event', holiday: 'badge-holiday', announcement: 'badge-announcement' };
        const CAT_LABEL = { news: '📰 News', event: '🎉 Event', holiday: '🎊 Holiday', announcement: '📢 Announcement' };
        const CAT_ICON = { news: '📰', event: '🎉', holiday: '🎊', announcement: '📢' };

        function renderNews(list) {
            const grid = document.getElementById('newsGrid');
            if (!list.length) { grid.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>No items found.</p></div>'; return; }
            const today = new Date().toISOString().split('T')[0];
            grid.innerHTML = list.map(n => {
                const isExpired = n.end_date && n.end_date < today;
                const dateStr = n.end_date
                    ? `${fmtDate(n.start_date)} → ${fmtDate(n.end_date)}`
                    : fmtDate(n.start_date);
                const imgSrc = n.image_url
                    ? (n.image_url.startsWith('http') ? n.image_url : API + n.image_url)
                    : null;
                return `
        <div class="news-card ${!n.is_active ? 'inactive' : ''}">
            ${imgSrc
                        ? `<img class="news-card-img" src="${imgSrc}" alt="${n.title}" onerror="this.style.display='none'">`
                        : `<div class="news-card-img-placeholder">${CAT_ICON[n.category] || '📰'}</div>`}
            <div class="news-card-body">
                <div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.5rem;flex-wrap:wrap;">
                    <span class="badge ${CAT_CLASS[n.category] || 'badge-news'}">${CAT_LABEL[n.category] || n.category}</span>
                    ${isExpired ? '<span class="badge badge-danger">Expired</span>' : ''}
                    ${!n.is_active ? '<span class="badge badge-muted">Hidden</span>' : ''}
                </div>
                <div class="news-card-title">${n.title}</div>
                <div class="news-card-desc">${n.description || ''}</div>
                <div class="news-card-meta">
                    <span>📅 ${dateStr}</span>
                    ${n.location_name ? `<span>📍 ${n.location_name}</span>` : ''}
                    ${n.phone ? `<span>📞 ${n.phone}</span>` : ''}
                    ${n.telegram ? `<span>✈️ ${n.telegram}</span>` : ''}
                </div>
                <div class="news-card-actions">
                    <button class="btn btn-secondary btn-sm" onclick="editNews(${n.id})">✏ Edit</button>
                    <button class="btn btn-warning btn-sm" onclick="toggleActive(${n.id},${!n.is_active})">
                        ${n.is_active ? '⏸ Hide' : '✅ Show'}
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="deleteNews(${n.id},'${n.title.replace(/'/g, "\\'")}')">✕</button>
                </div>
            </div>
        </div>`;
            }).join('');
        }

        async function saveNews() {
            clearAlerts();
            const id = document.getElementById('editId').value;
            const title = document.getElementById('nTitle').value.trim();
            const start_date = document.getElementById('nStartDate').value;
            if (!title) { showAlert('formError', 'Title is required.'); return; }
            if (!start_date) { showAlert('formError', 'Start date is required.'); return; }
            const body = {
                title,
                description: document.getElementById('nDescription').value || null,
                image_url: document.getElementById('nImageUrl').value || null,
                category: document.getElementById('nCategory').value,
                start_date,
                end_date: document.getElementById('nEndDate').value || null,
                is_active: document.getElementById('nActive').value === 'true',
                location_name: document.getElementById('nLocationName').value || null,
                location_lat: parseFloat(document.getElementById('nLat').value) || null,
                location_lng: parseFloat(document.getElementById('nLng').value) || null,
                phone: document.getElementById('nPhone').value || null,
                telegram: document.getElementById('nTelegram').value || null,
                instagram: document.getElementById('nInstagram').value || null,
            };
            try {
                const url = id ? `${API}/api/news/admin/${id}` : `${API}/api/news/admin/create`;
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'Failed'); }
                showAlert('formSuccess', id ? '✅ Updated!' : '✅ Created!');
                if (!id) resetForm();
                loadNews();
            } catch (e) { showAlert('formError', '❌ ' + e.message); }
        }

        async function editNews(id) {
            const n = allNews.find(x => x.id === id);
            if (!n) return;
            document.getElementById('editId').value = n.id;
            document.getElementById('formTitle').textContent = 'Edit News / Event';
            document.getElementById('nTitle').value = n.title || '';
            document.getElementById('nCategory').value = n.category || 'news';
            document.getElementById('nActive').value = n.is_active ? 'true' : 'false';
            document.getElementById('nStartDate').value = n.start_date || '';
            document.getElementById('nEndDate').value = n.end_date || '';
            document.getElementById('nDescription').value = n.description || '';
            document.getElementById('nImageUrl').value = n.image_url || '';
            document.getElementById('nLocationName').value = n.location_name || '';
            document.getElementById('nLat').value = n.location_lat || '';
            document.getElementById('nLng').value = n.location_lng || '';
            document.getElementById('nPhone').value = n.phone || '';
            document.getElementById('nTelegram').value = n.telegram || '';
            document.getElementById('nInstagram').value = n.instagram || '';
            if (n.image_url) showPreview(n.image_url.startsWith('http') ? n.image_url : API + n.image_url, 'nImagePreview');
            showSection('create', document.querySelector('[onclick*=create]'));
        }

        async function deleteNews(id, title) {
            if (!confirm(`Delete "${title}"?`)) return;
            try {
                await fetch(`${API}/api/news/admin/${id}`, { method: 'DELETE' });
                toast('Deleted', 'success'); loadNews();
            } catch (e) { toast('Failed', 'error'); }
        }

        async function toggleActive(id, newState) {
            const n = allNews.find(x => x.id === id);
            if (!n) return;
            try {
                await fetch(`${API}/api/news/admin/${id}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...n, is_active: newState, start_date: n.start_date, end_date: n.end_date || null })
                });
                toast(newState ? '✅ Now visible on homepage' : '⏸ Hidden from homepage', 'success');
                loadNews();
            } catch (e) { toast('Failed', 'error'); }
        }

        async function uploadNewsImage(input) {
            const file = input.files[0]; if (!file) return;
            const prog = document.getElementById('uploadProgress');
            prog.classList.add('show'); prog.textContent = '⏳ Uploading…';
            try {
                const fd = new FormData(); fd.append('file', file);
                const r = await fetch(`${API}/api/news/admin/upload-image`, { method: 'POST', body: fd });
                const d = await r.json(); if (!r.ok) throw new Error(d.detail);
                document.getElementById('nImageUrl').value = d.url;
                showPreview(API + d.url, 'nImagePreview');
                prog.textContent = '✅ Uploaded!';
                setTimeout(() => prog.classList.remove('show'), 2000);
            } catch (e) { prog.classList.remove('show'); toast('Upload failed', 'error'); }
        }

        // MAP
        function toggleMap() {
            const mapEl = document.getElementById('news-map');
            mapVisible = !mapVisible;
            mapEl.classList.toggle('show', mapVisible);
            if (mapVisible) {
                if (!nMap) {
                    const lat = parseFloat(document.getElementById('nLat').value) || 39.7084;
                    const lng = parseFloat(document.getElementById('nLng').value) || 66.9975;
                    nMap = L.map('news-map').setView([lat, lng], 6);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(nMap);
                    nMap.on('click', e => {
                        setNewsPin(e.latlng.lat, e.latlng.lng);
                        document.getElementById('nLat').value = e.latlng.lat.toFixed(6);
                        document.getElementById('nLng').value = e.latlng.lng.toFixed(6);
                    });
                    if (parseFloat(document.getElementById('nLat').value)) {
                        setNewsPin(parseFloat(document.getElementById('nLat').value),
                            parseFloat(document.getElementById('nLng').value));
                    }
                }
                setTimeout(() => nMap.invalidateSize(), 100);
            }
        }
        function setNewsPin(lat, lng) {
            if (nMarker) nMap.removeLayer(nMarker);
            nMarker = L.marker([lat, lng]).addTo(nMap);
            nMap.setView([lat, lng], 13);
        }
        function updateMapFromInputs() {
            const lat = parseFloat(document.getElementById('nLat').value);
            const lng = parseFloat(document.getElementById('nLng').value);
            if (lat && lng && nMap) setNewsPin(lat, lng);
        }

        function resetForm() {
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = 'Create News / Event';
            ['nTitle', 'nStartDate', 'nEndDate', 'nDescription', 'nImageUrl',
                'nLocationName', 'nLat', 'nLng', 'nPhone', 'nTelegram', 'nInstagram']
                .forEach(id => document.getElementById(id).value = '');
            document.getElementById('nCategory').selectedIndex = 0;
            document.getElementById('nActive').selectedIndex = 0;
            document.getElementById('nImagePreview').classList.remove('show');
            document.getElementById('news-map').classList.remove('show');
            if (nMarker && nMap) { nMap.removeLayer(nMarker); nMarker = null; }
            mapVisible = false;
            clearAlerts();
        }

        function fmtDate(d) { if (!d) return '—'; return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
        function showPreview(url, id) { const el = document.getElementById(id); if (!el || !url) return; el.src = url; el.classList.add('show'); }
        function showAlert(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }
        function clearAlerts() { ['formSuccess', 'formError'].forEach(id => { const el = document.getElementById(id); el.textContent = ''; el.style.display = 'none'; }); }
        function toast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.innerHTML = `<span>${{ success: '✅', error: '❌', info: 'ℹ️' }[type] || 'ℹ️'}</span> ${msg}`;
            c.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
    </script>
</body>

</html>
